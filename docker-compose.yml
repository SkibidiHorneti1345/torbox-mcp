services:
  mcp-server:
    build: .
    container_name: torbox-mcp
    restart: unless-stopped
    environment:
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8000
      - PROWLARR_URL=http://prowlarr:9696
      - PROWLARR_API_KEY=${PROWLARR_API_KEY}
      - TORBOX_API_KEY=${TORBOX_API_KEY}
    networks:
      - torbox-net
    depends_on:
      - prowlarr
    ports:
      - "8000:8000"

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ./data/prowlarr:/config
    ports:
      - "9696:9696"
    restart: unless-stopped
    networks:
      - torbox-net

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
      - LOG_HTML=false
      - CAPTCHA_SOLVER=none
      - TZ=Etc/UTC
    ports:
      - "8191:8191"
    restart: unless-stopped
    networks:
      - torbox-net

networks:
  torbox-net:
    driver: bridge
